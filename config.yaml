agent:
  data_dir: "./data"
  max_iterations: 42

# --- LLM Provider ---
# Set `name` to one of: openai | google_genai | anthropic
# Set `model` to a model supported by that provider.
# provider:
#   name: openai
#   model: gpt-5.2
#   temperature: 0.5
#   max_tokens: 8192

# --- Uncomment to use Google Gemini ---
provider:
  name: google_genai
  # model: gemini-2.0-flash
  model: gemini-3-flash-preview
  temperature: 1.0
  max_tokens: 8192

# --- Uncomment to use Anthropic Claude ---
# provider:
#   name: anthropic
#   model: claude-sonnet-4-6
#   temperature: 0.5
#   max_tokens: 8192

database:
  url: "${DATABASE_URL}"

skills:
  enabled: true

logging:
  level: INFO
