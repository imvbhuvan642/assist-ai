agent:
  data_dir: "./data"
  max_iterations: 42

# --- LLM Provider ---
# Set `name` to one of: openai | google_genai | anthropic
# Set `model` to a model supported by that provider.
provider:
  name: openai
  model: gpt-5-mini
  temperature: 0.5
  max_tokens: 8192

# --- Uncomment to use Google Gemini ---
# provider:
#   name: google_genai
#   model: gemini-2.0-flash
#   temperature: 1.0
#   max_tokens: 8192

# --- Uncomment to use Anthropic Claude ---
# provider:
#   name: anthropic
#   model: claude-sonnet-4-6
#   temperature: 0.5
#   max_tokens: 8192

database:
  url: "${DATABASE_URL}"

skills:
  enabled: true

logging:
  level: INFO

# --- Langfuse Tracing ---
# Set enabled: true and add LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY,
# and LANGFUSE_BASE_URL to your .env file.
langfuse:
  enabled: true

# --- MCP Servers ---
# Add any MCP server here and its tools become available to the agent automatically.
# Two transport types supported:
#
#   stdio — spawns a local process (needs the package installed, e.g. via npx/uvx)
#   sse   — connects to an already-running HTTP MCP server
#
# Examples (uncomment and edit to enable):
#
mcp:
  servers:
    playwright:
      transport: stdio
      command: npx
      args: ["-y", "@playwright/mcp"]
