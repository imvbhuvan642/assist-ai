agent:
  data_dir: "./data"
  max_iterations: 42

# --- LLM Provider ---
# Set `name` to one of: openai | google_genai | anthropic | groq
# Set `model` to a model supported by that provider.
# provider:
#   name: openai
#   model: gpt-5.2
#   temperature: 0.5
#   max_tokens: 8192

# --- Uncomment to use Google Gemini ---
# provider:
#   name: google_genai
#   model: gemini-2.0-flash
#   temperature: 1.0


# --- Uncomment to use Groq Llama ---
provider:
  name: groq
  model: llama-3.3-70b-versatile
  temperature: 0.5
  max_tokens: 8192

# --- Uncomment to use Anthropic Claude ---
# provider:
#   name: anthropic
#   model: claude-sonnet-4-6
#   temperature: 0.5
#   max_tokens: 8192

database:
  url: "${DATABASE_URL}"

skills:
  enabled: true

logging:
  level: INFO
